<div
  class="fixed top-5 right-5 z-[9999] flex flex-col gap-2 max-w-[400px]"
  data-testid="toast-container"
>
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="flex items-center gap-2.5 px-4 py-3 rounded-xl shadow-lg text-[13px] font-medium animate-slide-in"
      [class]="toastClasses(toast.type)"
      [attr.data-testid]="'toast-' + toast.id"
    >
      <span class="shrink-0 flex">
        @if (toast.type === 'success') {
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <path d="M20 6L9 17l-5-5" />
          </svg>
        } @else if (toast.type === 'error') {
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <circle cx="12" cy="12" r="10" />
            <path d="M15 9l-6 6M9 9l6 6" />
          </svg>
        } @else {
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <circle cx="12" cy="12" r="10" />
            <path d="M12 16v-4M12 8h.01" />
          </svg>
        }
      </span>
      <span class="flex-1">{{ toast.message }}</span>
      <button
        class="bg-transparent border-none cursor-pointer opacity-50 p-0.5 flex text-current hover:opacity-100"
        (click)="toastService.dismiss(toast.id)"
        data-testid="toast-dismiss"
      >
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M18 6L6 18M6 6l12 12" />
        </svg>
      </button>
    </div>
  }
</div>
